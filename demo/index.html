<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panic: Home Episode - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- Top HUD -->
    <div id="hud">
      <div class="hud-left">
        <div id="hp-bar-container">
          <div id="hp-bar-fill"></div>
          <span id="hp-text">3.00 / 3</span>
        </div>
        <div id="battery-bar-container" class="hidden">
          <div id="battery-bar-fill"></div>
          <span id="battery-text">100%</span>
        </div>
      </div>
      <button id="hint-btn">เปิด/ปิดแสงนำทาง (Hint)</button>
    </div>

    <!-- Action Log -->
    <div id="action-log-container" class="collapsed">
      <button id="toggle-action-log">📋 บันทึกการกระทำ</button>
      <div id="action-log-content">
        <ul id="action-log-list">
          <!-- Action logs will go here -->
        </ul>
      </div>
    </div>

    <!-- UI Overlays injected via JS -->

    <!-- Storage Room Anomaly UI (Darkness overlay via style) -->

    <!-- Dialogue Box (global, above all UI layers) -->
    <div id="dialogue-box" class="hidden">
      <div class="dialogue-inner">
        <p id="dialogue-text"></p>
        <button id="dialogue-close" class="hidden">ตกลง</button>
      </div>
    </div>

    <!-- Interactive Scene System -->
    <div id="scene" class="room-bedroom">
      <!-- Interactive objects injected here -->
      <div id="interactive-layer"></div>
      


      <!-- Death Screen -->
      <div id="death-screen" class="hidden overlay-screen">
        <h1>YOU DIED</h1>
        <p id="death-reason"></p>
        <button id="restart-btn">Try Again</button>
      </div>

      <!-- Final Action Screen (shows before win results) -->
      <div id="final-action-screen" class="hidden overlay-screen">
        <div id="final-action-inner">
          <p id="final-action-text"></p>
          <p id="final-action-game-over" style="font-size:1.8rem; letter-spacing:4px; margin-top: 18px;">จบเกมส์</p>
          <button id="final-action-ok">ตกลง</button>
        </div>
      </div>

      <!-- Win Screen -->
      <div id="win-screen" class="hidden overlay-screen">
      </div>
    </div>

    <!-- Bottom Panel -->
    <div id="bottom-panel">
      <!-- Inventory (6 slots) -->
      <div id="inventory">
        <h3>ช่องเก็บของ</h3>
        <div class="slots">
          <div class="slot" data-index="0"></div>
          <div class="slot" data-index="1"></div>
          <div class="slot" data-index="2"></div>
          <div class="slot" data-index="3"></div>
          <div class="slot" data-index="4"></div>
          <div class="slot" data-index="5"></div>
          <div class="slot" data-index="6"></div>
          <div class="slot" data-index="7"></div>
          <div class="slot" data-index="8"></div>
        </div>
      </div>
      
      <!-- Log / Notes -->
      <div id="log-panel">
        <h3>สมุดบันทึก</h3>
        <ul id="log-list">
          <!-- Logs will be injected here -->
        </ul>
      </div>
    </div>
  </div>

  <script src="state.js"></script>
  <script src="ui.js"></script>
  <script src="room.js"></script>
  <script src="timers.js"></script>
  <script src="rooms/bedroom.js"></script>
  <script src="rooms/bathroom.js"></script>
  <script src="rooms/hallway_f2.js"></script>
  <script src="rooms/hallway_f1.js"></script>
  <script src="rooms/kitchen.js"></script>
  <script src="rooms/dining_room.js"></script>
  <script src="rooms/storage.js"></script>
  <script src="rooms/living_room.js"></script>
  <script src="rooms/laundry.js"></script>
  <script src="rooms/front_garden.js"></script>
  <script src="rooms/fence_gate.js"></script>
  <script src="rooms/road.js"></script>
  <script src="main.js"></script>
</body>
</html>
